<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagonal Club Esp. A</title>

<!-- KEEP YOUR EXISTING CSS EXACTLY AS IS -->
<!-- (no changes needed there) -->

</head>
<body>

<!-- HEADER -->
<div class="hdr"><div class="hdr-in">
  <div class="logo">DC</div>
  <div class="hdr-txt">
    <div class="hdr-sub">Club de Fútbol · Barcelona</div>
    <div class="hdr-title">Diagonal Club Esp. A</div>
    <div class="hdr-meta">Infantil Primera Divisió S14 · Grup 9 · 2025/26</div>
  </div>
  <div class="hdr-pts"><div class="hdr-pts-n" id="hdr-pts">0</div><div class="hdr-pts-l">Puntos</div></div>
</div></div>

<!-- NAV -->
<div class="nav"><div class="nav-in">
  <button class="nb on" onclick="App.tab('resumen',this)">Resumen</button>
  <button class="nb" onclick="App.tab('clasificacion',this)">Clasificación</button>
  <button class="nb" onclick="App.tab('proximos',this)">Próximos</button>
  <button class="nb" onclick="App.tab('partidos',this)">Partidos</button>
  <button class="nb" onclick="App.tab('jugadores',this)">Jugadores</button>
  <button class="nb" onclick="App.tab('arbitros',this)">Árbitros</button>
  <button class="nb" onclick="App.tab('analisis',this)">Análisis</button>
</div></div>

<main>

<!-- RESUMEN -->
<div id="resumen" class="sec on">
  <div id="kpis"></div>
</div>

<!-- CLASIFICACION -->
<div id="clasificacion" class="sec">
  <div class="card">
    <div style="overflow-x:auto">
      <table class="tbl">
        <tbody id="clas-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- PROXIMOS (FIXED) -->
<div id="proximos" class="sec">
  <div class="g2">
    <div>
      <div style="font-size:10px;font-weight:700;margin-bottom:8px">Próximo partido</div>
      <div class="card" id="next-match">
        <div class="card-body"><div class="empty">—</div></div>
      </div>

      <div style="font-size:10px;font-weight:700;margin-bottom:8px">Resto de temporada</div>
      <div class="card">
        <div class="mlist" id="upcoming-rest"></div>
      </div>
    </div>
  </div>
</div>

<!-- PARTIDOS -->
<div id="partidos" class="sec">
  <div class="card">
    <div class="mlist" id="partidos-list"></div>
  </div>
</div>

<!-- JUGADORES -->
<div id="jugadores" class="sec">
  <div class="card">
    <table class="ptbl">
      <tbody id="players-body"></tbody>
    </table>
  </div>
</div>

<!-- ARBITROS -->
<div id="arbitros" class="sec">
  <div id="ref-list"></div>
</div>

<!-- ANALISIS -->
<div id="analisis" class="sec">
  <div id="anl-stats"></div>
</div>

</main>

<!-- DATA -->
<script src="data/players.js"></script>
<script src="data/matches.js"></script>
<script src="data/upcoming.js"></script>
<script src="data/standings.js"></script>

<!-- CORE -->
<script>

function fmtDate(d){
  if(!d) return '';
  const p=d.split('-');
  return p[2]+'/'+p[1];
}

function safeText(v){
  return String(v||'')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;');
}

function upcomingTeams(u){
  return u.home
    ? '<b>Diagonal</b> vs '+safeText(u.rival)
    : safeText(u.rival)+' vs <b>Diagonal</b>';
}

/* ---------- PROXIMOS (FIXED) ---------- */
function renderProximos(){

  if(!window.UPCOMING) return;

  const played = MATCHES.map(m=>m.j);

  const pend = UPCOMING
    .filter(u => !played.includes(u.j))
    .sort((a,b)=> new Date(a.date)-new Date(b.date));

  const next = pend[0];

  const box = document.getElementById('next-match');

  if(!box) return;

  if(next){
    box.innerHTML =
      '<div class="card-body">'+
      'J'+next.j+' · '+fmtDate(next.date)+'<br>'+
      upcomingTeams(next)+
      '</div>';
  }else{
    box.innerHTML='<div class="card-body">Sin partidos</div>';
  }

  const rest = document.getElementById('upcoming-rest');

  if(!rest) return;

  rest.innerHTML = pend.slice(1).map(u =>
    '<div class="uprow">'+
      'J'+u.j+' · '+upcomingTeams(u)+'<br>'+
      '<small>'+fmtDate(u.date)+'</small>'+
    '</div>'
  ).join('') || '<div class="empty">—</div>';
}

/* ---------- PARTIDOS ---------- */
function renderPartidos(){
  const el=document.getElementById('partidos-list');
  if(!el) return;

  el.innerHTML = MATCHES.map(m =>
    '<div class="mrow">'+
      'J'+m.j+' · '+m.gf+'-'+m.gc+
    '</div>'
  ).join('');
}

/* ---------- SIMPLE INIT ---------- */
function init(){
  renderProximos();
  renderPartidos();
}

init();

var App={
  tab:function(id,btn){
    document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
    document.getElementById(id).classList.add('on');
    document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
    if(btn) btn.classList.add('on');
  }
};

</script>

</body>
</html>
