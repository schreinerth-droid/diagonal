<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagonal Club Esp. A</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f3;
  margin:0;
  padding:20px;
  color:#1a1916;
}

h1{
  margin-bottom:5px;
}

.sub{
  color:#666;
  margin-bottom:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
  margin-bottom:20px;
}

.controls{
  margin-bottom:15px;
}

button{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #ccc;
  cursor:pointer;
  background:white;
  font-weight:600;
}

button.active{
  background:#1a3a6b;
  color:white;
  border-color:#1a3a6b;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

th{
  font-size:12px;
  text-transform:uppercase;
  color:#666;
}

tr.diagonal{
  background:#eef3ff;
  font-weight:700;
}

.badge{
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  font-weight:700;
}

.pending{
  background:#fff4d6;
  color:#8a6d00;
}

.ok{
  background:#e6f4ea;
  color:#1a6b3c;
}
</style>
</head>

<body>

<h1>Diagonal Club Esp. A</h1>
<div class="sub">INFANTIL PRIMERA DIVISIÓ S14 · GRUP 9</div>

<div class="card">
  <h2>Clasificación</h2>

  <div class="controls">
    <button id="btnOfficial" class="active">Oficial</button>
    <button id="btnPPG">PPG</button>
  </div>

  <div id="standingsTable"></div>
</div>

<!-- DATA FILES -->
<script src="data/players.js"></script>
<script src="data/matches.js"></script>
<script src="data/upcoming.js"></script>
<script src="data/standings.js"></script>

<!-- LOGIC -->
<script src="update.js"></script>

<script>
let mode = "official";

document.getElementById("btnOfficial").onclick = () => {
  mode = "official";
  setActive("btnOfficial");
  render();
};

document.getElementById("btnPPG").onclick = () => {
  mode = "ppg";
  setActive("btnPPG");
  render();
};

function setActive(id){
  document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function render(){
  renderStandingsTable("standingsTable", mode);
}

render();
</script>

</body>
</html>
