<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagonal Club Esp. A</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f5f3;
      margin:0;
      padding:20px;
      color:#1a1916;
    }

    .container{
      max-width:1100px;
      margin:0 auto;
    }

    h1{
      margin:0 0 6px 0;
      font-size:32px;
    }

    .sub{
      color:#666;
      margin-bottom:24px;
    }

    .card{
      background:#fff;
      padding:20px;
      border-radius:12px;
      box-shadow:0 5px 20px rgba(0,0,0,0.05);
      margin-bottom:20px;
    }

    h2{
      margin:0 0 16px 0;
      font-size:22px;
    }

    .controls{
      display:flex;
      gap:10px;
      margin-bottom:15px;
    }

    button{
      padding:8px 12px;
      border-radius:8px;
      border:1px solid #ccc;
      cursor:pointer;
      background:white;
      font-weight:600;
    }

    button.active{
      background:#1a3a6b;
      color:white;
      border-color:#1a3a6b;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      padding:10px;
      border-bottom:1px solid #eee;
      text-align:left;
    }

    th{
      font-size:12px;
      text-transform:uppercase;
      color:#666;
    }

    tr.diagonal{
      background:#eef3ff;
      font-weight:700;
    }

    .badge{
      padding:4px 8px;
      border-radius:6px;
      font-size:12px;
      font-weight:700;
      display:inline-block;
    }

    .pending{
      background:#fff4d6;
      color:#8a6d00;
    }

    .ok{
      background:#e6f4ea;
      color:#1a6b3c;
    }

    .summary{
      margin-top:10px;
      color:#555;
      font-size:14px;
    }

    @media (max-width: 768px){
      body{padding:14px}
      h1{font-size:26px}
      th, td{padding:8px}
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Diagonal Club Esp. A</h1>
    <div class="sub">INFANTIL PRIMERA DIVISIÓ S14 · GRUP 9</div>

    <div class="card">
      <h2>Clasificación</h2>

      <div class="controls">
        <button id="btnOfficial" class="active" type="button">Oficial</button>
        <button id="btnPPG" type="button">PPG</button>
      </div>

      <div id="standingsTable"></div>
      <div id="standingsSummary" class="summary"></div>
    </div>
  </div>

  <script src="data/players.js"></script>
  <script src="data/matches.js"></script>
  <script src="data/upcoming.js"></script>
  <script src="data/standings.js"></script>
  <script src="update.js"></script>

  <script>
    let mode = 'official';

    function setActiveButton(id){
      document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
      const btn = document.getElementById(id);
      if (btn) btn.classList.add('active');
    }

    function renderSummary(){
      if (typeof getDiagonalStanding !== 'function' || typeof getPerformanceTable !== 'function' || typeof getOfficialTable !== 'function') {
        return;
      }

      const diagonal = getDiagonalStanding();
      if (!diagonal) {
        document.getElementById('standingsSummary').textContent = 'No standings data available.';
        return;
      }

      const officialPos = getOfficialTable().findIndex(row => row.team === 'DIAGONAL CLUB ESP. A') + 1;
      const ppgPos = getPerformanceTable().findIndex(row => row.team === 'DIAGONAL CLUB ESP. A') + 1;

      document.getElementById('standingsSummary').innerHTML =
        'Diagonal está <strong>' + officialPos + 'º</strong> en la clasificación oficial y <strong>' +
        ppgPos + 'º</strong> por PPG. ' +
        (diagonal.pending ? 'Tiene un partido pendiente.' : 'Tiene el calendario al día.');
    }

    function renderPage(){
      if (typeof renderStandingsTable === 'function') {
        renderStandingsTable('standingsTable', mode);
      }
      renderSummary();
    }

    document.getElementById('btnOfficial').addEventListener('click', function(){
      mode = 'official';
      setActiveButton('btnOfficial');
      renderPage();
    });

    document.getElementById('btnPPG').addEventListener('click', function(){
      mode = 'ppg';
      setActiveButton('btnPPG');
      renderPage();
    });

    renderPage();
  </script>
</body>
</html>
