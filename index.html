<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagonal Club Esp. A</title>

<style>
body{font-family:Arial, sans-serif;background:#f5f5f3;margin:0}
.sec{display:none;padding:20px}
.sec.on{display:block}
.nb{padding:10px;border:none;background:#ddd;cursor:pointer}
.nb.on{background:#1a3a6b;color:#fff}
.card{background:#fff;padding:10px;margin-bottom:10px;border:1px solid #ccc}
.empty{color:#999}
</style>
</head>

<body>

<!-- HEADER -->
<div style="padding:20px;background:#fff;border-bottom:1px solid #ccc">
  <h2>Diagonal Club Esp. A</h2>
  <div>Puntos: <span id="hdr-pts">0</span></div>
</div>

<!-- NAV -->
<div>
  <button class="nb on" onclick="App.tab('resumen',this)">Resumen</button>
  <button class="nb" onclick="App.tab('clasificacion',this)">Clasificación</button>
  <button class="nb" onclick="App.tab('proximos',this)">Próximos</button>
  <button class="nb" onclick="App.tab('partidos',this)">Partidos</button>
</div>

<main>

<!-- RESUMEN -->
<div id="resumen" class="sec on">
  <div class="card">
    <div>Puntos: <span id="k-pts">0</span></div>
    <div>Victorias: <span id="k-w">0</span></div>
    <div>Empates: <span id="k-d">0</span></div>
    <div>Derrotas: <span id="k-l">0</span></div>
  </div>
</div>

<!-- CLASIFICACION -->
<div id="clasificacion" class="sec">
  <div class="card">
    <table border="1" width="100%">
      <thead>
        <tr>
          <th>#</th><th>Equipo</th><th>Pts</th>
        </tr>
      </thead>
      <tbody id="clas-body"></tbody>
    </table>
  </div>
</div>

<!-- PROXIMOS -->
<div id="proximos" class="sec">
  <div class="card" id="next-match">
    <div class="empty">—</div>
  </div>

  <div class="card">
    <div id="upcoming-rest"></div>
  </div>
</div>

<!-- PARTIDOS -->
<div id="partidos" class="sec">
  <div class="card" id="partidos-list"></div>
</div>

</main>

<!-- DATA -->
<script src="data/players.js"></script>
<script src="data/matches.js"></script>
<script src="data/upcoming.js"></script>
<script src="data/standings.js"></script>

<script>
function safe(v){return v||''}

function renderResumen(){
  if(!MATCHES) return;

  let w=0,d=0,l=0;

  MATCHES.forEach(m=>{
    if(m.res==='G') w++;
    else if(m.res==='E') d++;
    else l++;
  });

  let pts = w*3 + d;

  document.getElementById('hdr-pts').textContent = pts;
  document.getElementById('k-pts').textContent = pts;
  document.getElementById('k-w').textContent = w;
  document.getElementById('k-d').textContent = d;
  document.getElementById('k-l').textContent = l;
}

function renderClasificacion(){
  if(!STANDINGS) return;

  document.getElementById('clas-body').innerHTML =
    STANDINGS.map(t=>`
      <tr>
        <td>${t.pos}</td>
        <td>${safe(t.team)}</td>
        <td>${t.pts}</td>
      </tr>
    `).join('');
}

function renderProximos(){
  if(!UPCOMING) return;

  const next = UPCOMING[0];

  const el = document.getElementById('next-match');
  if(!el) return;

  if(next){
    el.innerHTML = `
      <div>J${next.j}</div>
      <div>${safe(next.rival)}</div>
      <div>${next.date}</div>
    `;
  }
}

function renderPartidos(){
  if(!MATCHES) return;

  document.getElementById('partidos-list').innerHTML =
    MATCHES.map(m=>`
      <div>J${m.j} - ${m.gf}-${m.gc}</div>
    `).join('');
}

var App = {
  tab:function(id,btn){
    document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
    document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
    document.getElementById(id).classList.add('on');
    btn.classList.add('on');
  }
};

renderResumen();
renderClasificacion();
renderProximos();
renderPartidos();
</script>

</body>
</html>
