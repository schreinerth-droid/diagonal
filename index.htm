<div style="margin:20px 0">
  <textarea id="input-box" placeholder="Paste ACTA or STANDINGS here..." style="width:100%;height:150px;padding:10px"></textarea>
  <button onclick="processInput()" style="margin-top:10px;padding:8px 12px">Procesar</button>
</div>

<pre id="output-box" style="background:#111;color:#0f0;padding:10px;margin-top:10px;white-space:pre-wrap"></pre>

<!-- 🔻 REPLACE YOUR last5ForTeam FUNCTION WITH THIS -->

<script>
function normalizeTeamName(s){
  return String(s || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]/g, '');
}

function last5ForTeam(name){
  if (!window.STANDINGS || !Array.isArray(window.STANDINGS)) return ['N','N','N','N','N'];

  var target = normalizeTeamName(name);

  var row = window.STANDINGS.find(function(r){
    return normalizeTeamName(r.team) === target;
  });

  if (row && Array.isArray(row.last5)) return row.last5;
  if (row && Array.isArray(row.l5)) return row.l5;

  return ['N','N','N','N','N'];
}

function processInput(){
  var txt = document.getElementById('input-box').value;

  if(txt.includes('ACTA') || txt.includes('Titulars')){
    processActa(txt);
  } else {
    processStandings(txt);
  }
}

function processActa(txt){
  var score = txt.match(/(\d+)\s*-\s*(\d+)/);

  var gf = score ? parseInt(score[2]) : 0;
  var gc = score ? parseInt(score[1]) : 0;

  var res = gf > gc ? 'G' : gf < gc ? 'P' : 'E';

  var obj = `{
  j: XX,
  date: "YYYY-MM-DD",
  loc: "F",
  home: "RIVAL",
  away: "DIAGONAL CLUB ESP. A",
  gf: ${gf},
  gc: ${gc},
  res: "${res}"
}`;

  document.getElementById('output-box').textContent = obj;
}

function processStandings(txt){
  var lines = txt.split('\n').filter(l => l.trim().length > 0);

  var out = "var STANDINGS = [\n";

  lines.forEach((l,i)=>{
    if(!l.match(/\d/)) return;

    out += `  { pos:${i+1}, team:"${l}", pts:0, j:0, g:0, e:0, p:0, gf:0, gc:0, last5:['N','N','N','N','N'] },\n`;
  });

  out += "];";

  document.getElementById('output-box').textContent = out;
}
</script>
